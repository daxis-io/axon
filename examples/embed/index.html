<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Axon · embedding sketch</title>
    <style>
      body {
        font:
          14px/1.5 system-ui,
          sans-serif;
        margin: 40px;
        max-width: 720px;
      }
      h1 {
        font-size: 18px;
      }
      pre {
        background: #f4f3ee;
        border: 1px solid #e4e1d8;
        padding: 12px;
        border-radius: 6px;
        overflow: auto;
      }
      button {
        padding: 8px 14px;
        border: 0;
        border-radius: 6px;
        background: #1f4fe0;
        color: white;
        font: 500 13px system-ui;
        cursor: pointer;
      }
      .status {
        color: #6c6859;
        margin-top: 12px;
      }
      .err {
        color: #b23a2b;
      }
    </style>
  </head>
  <body>
    <h1>Axon embedding sketch</h1>
    <p>
      This page demonstrates the shape of an Axon embedding. Edit the
      <code>SDK_URL</code>, <code>WORKER_URL</code>, and
      <code>DESCRIPTOR_URL</code> constants below to point at your own
      host-built SDK, worker, and snapshot descriptor.
    </p>

    <button id="run">Run query</button>
    <div class="status" id="status">Idle.</div>
    <pre id="output">// SQL output will render here</pre>

    <script type="module">
      // The host application is responsible for serving these URLs.
      // For a runnable example, see apps/axon-web/ in the repo.
      const SDK_URL = "/axon-browser-sdk.js";
      const WORKER_URL = "/worker.js";
      const DESCRIPTOR_URL = "/descriptor.json";

      const statusEl = document.getElementById("status");
      const outputEl = document.getElementById("output");

      document.getElementById("run").addEventListener("click", async () => {
        statusEl.textContent = "Booting worker…";
        statusEl.classList.remove("err");
        let client;
        let opened = false;
        try {
          const { createAxonBrowserClient } = await import(SDK_URL);
          const descriptor = await fetch(DESCRIPTOR_URL).then((r) => r.json());
          client = createAxonBrowserClient({
            workerUrl: WORKER_URL,
            onEvent: (event) => {
              if ("progress" in event) {
                statusEl.textContent = `Stage: ${event.progress.context.phase} ${event.progress.stage}`;
              }
            },
          });

          await client.openDeltaTable("orders", descriptor);
          opened = true;
          const result = await client.query(
            "orders",
            "SELECT COUNT(*) AS row_count FROM orders",
            {
              preferredTarget: "browser_wasm",
            },
          );

          outputEl.textContent = JSON.stringify(
            {
              executedOn: result.response.executed_on,
              arrowIpcBytes: result.result.bytes.byteLength,
              preview: result.preview ?? null,
            },
            null,
            2,
          );
          statusEl.textContent = "Done.";
        } catch (err) {
          statusEl.textContent = `Error: ${err instanceof Error ? err.message : String(err)}`;
          statusEl.classList.add("err");
        } finally {
          if (opened) {
            await client?.dispose("orders").catch(() => undefined);
          }
          client?.terminate();
        }
      });
    </script>
  </body>
</html>
