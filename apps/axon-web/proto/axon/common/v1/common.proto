syntax = "proto3";

package axon.common.v1;

enum ResourceKind {
  RESOURCE_KIND_UNSPECIFIED = 0;
  RESOURCE_KIND_TABLE = 1;
  RESOURCE_KIND_VOLUME = 2;
}

message CanonicalResourceRef {
  string connection_id = 1;
  string provider_namespace = 2;
  ResourceKind kind = 3;

  oneof identity {
    string provider_object_id = 4;
    string canonical_locator = 5;
  }
}

message PageRequest {
  string cursor = 1;
  uint32 page_size = 2;
}

message PageInfo {
  reserved 2;
  reserved "has_more";

  optional string next_cursor = 1;
}

message ProviderError {
  ProviderErrorCode code = 1;
  string message = 2;
  string correlation_id = 3;
}

enum ProviderErrorCode {
  PROVIDER_ERROR_CODE_UNSPECIFIED = 0;
  PROVIDER_ERROR_CODE_SESSION_EXPIRED = 1;
  PROVIDER_ERROR_CODE_BLOCKED = 2;
  PROVIDER_ERROR_CODE_NOT_FOUND = 3;
  PROVIDER_ERROR_CODE_UNAVAILABLE = 4;
  PROVIDER_ERROR_CODE_INVALID = 5;
}
