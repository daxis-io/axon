syntax = "proto3";

package axon.dataaccess.v1;

import "axon/common/v1/common.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

message CapabilityReport {
  repeated CapabilityEntry capabilities = 1;
}

message CapabilityEntry {
  CapabilityKey key = 1;
  CapabilityState state = 2;
}

message PartitionValue {
  oneof value {
    string string_value = 1;
    google.protobuf.NullValue null_value = 2;
  }
}

message BrowserHttpFileDescriptor {
  string path = 1;
  string url = 2;
  uint64 size_bytes = 3 [json_name = "size_bytes"];
  map<string, PartitionValue> partition_values = 4 [json_name = "partition_values"];
  optional string stats = 5;
  optional string object_etag = 6 [json_name = "object_etag"];
}

message BrowserHttpSnapshotDescriptor {
  string table_uri = 1 [json_name = "table_uri"];
  optional int64 snapshot_version = 2 [json_name = "snapshot_version"];
  map<string, PartitionColumnType> partition_column_types = 3 [json_name = "partition_column_types"];
  CapabilityReport browser_compatibility = 4 [json_name = "browser_compatibility"];
  CapabilityReport required_capabilities = 5 [json_name = "required_capabilities"];
  repeated BrowserHttpFileDescriptor active_files = 6 [json_name = "active_files"];
}

// Carries a directly openable Parquet dataset and its browser capability reports.
message BrowserHttpParquetDatasetDescriptor {
  string table_uri = 1 [json_name = "table_uri"];
  map<string, PartitionColumnType> partition_column_types = 2 [json_name = "partition_column_types"];
  CapabilityReport browser_compatibility = 3 [json_name = "browser_compatibility"];
  CapabilityReport required_capabilities = 4 [json_name = "required_capabilities"];
  repeated BrowserHttpFileDescriptor files = 5;
}

message BrowserReadDescriptor {
  oneof descriptor {
    BrowserHttpSnapshotDescriptor snapshot = 1;
    BrowserHttpParquetDatasetDescriptor parquet_dataset = 2 [json_name = "parquet_dataset"];
  }
}

message ResolutionProvenance {
  string resolver_id = 1;
  string resolution_id = 2;
}

message ResolvedBrowserRead {
  axon.common.v1.CanonicalResourceRef resource = 1;
  BrowserReadDescriptor descriptor = 2;
  BrowserAccessClass access_class = 3;
  google.protobuf.Timestamp not_after = 4;
  string correlation_id = 5;
  ResolutionProvenance provenance = 6;
}

message RemoteRequired {
  axon.common.v1.CanonicalResourceRef resource = 1;
  string enforcement_owner = 2;
  ReadResolutionReason reason = 3;
  string message = 4;
}

message ReadDenied {
  axon.common.v1.CanonicalResourceRef resource = 1;
  ReadResolutionReason reason = 2;
  string message = 3;
}

message ReadResolution {
  oneof outcome {
    ResolvedBrowserRead browser_read = 1;
    RemoteRequired remote_required = 2;
    ReadDenied denied = 3;
    axon.common.v1.ProviderError error = 4;
  }
}

message ObjectGrantListRequest {
  string prefix = 1;
}

message ObjectGrantListResponse {
  repeated ObjectGrantObject objects = 1;
}

message ObjectGrantHeadRequest {
  string path = 1;
}

message ObjectGrantHeadResponse {
  string path = 1;
  uint64 size_bytes = 2 [json_name = "sizeBytes"];
  optional string etag = 3;
}

message ObjectGrantObject {
  string path = 1;
  uint64 size_bytes = 2 [json_name = "sizeBytes"];
  optional string etag = 3;
}

message ObjectGrantBatchSignRequest {
  repeated string paths = 1;
}

message ObjectGrantBatchSignResponse {
  repeated ObjectGrantSignedUrl signed_urls = 1 [json_name = "signedUrls"];
}

message ObjectGrantSignedUrl {
  string path = 1;
  string url = 2;
  uint64 expires_at_epoch_ms = 3 [json_name = "expiresAtEpochMs"];
}

message ObjectGrantRangeRequest {
  string path = 1;
  optional uint64 start = 2;
  optional uint64 end = 3;
}

// Protobuf transports use this envelope for range bytes and metadata. The
// existing HTTP object-grant route returns the bytes directly as
// application/octet-stream with equivalent response headers.
message ObjectGrantRangeResponse {
  bytes data = 1;
  optional string content_range = 2 [json_name = "contentRange"];
  optional string etag = 3;
  uint64 size_bytes = 4 [json_name = "sizeBytes"];
}

message ObjectGrantAuditRange {
  optional uint64 start = 1;
  optional uint64 end = 2;
}

message ObjectGrantAuditEvent {
  reserved 11;
  reserved "query_id", "request_id";

  string event_id = 1 [json_name = "eventId"];
  string event_type = 2 [json_name = "eventType"];
  uint64 occurred_at_epoch_ms = 3 [json_name = "occurredAtEpochMs"];
  string tenant_id = 4 [json_name = "tenantId"];
  string workspace_id = 5 [json_name = "workspaceId"];
  string user_subject = 6 [json_name = "userSubject"];
  string table_id = 7 [json_name = "tableId"];
  string full_name = 8 [json_name = "fullName"];
  string grant_id = 9 [json_name = "grantId"];
  string execution_id = 10 [json_name = "executionId"];
  string correlation_id = 12 [json_name = "correlationId"];
  ObjectGrantAuditAction action = 13;
  string object_path = 14 [json_name = "objectPath"];
  ObjectGrantAuditRange range = 15;
  ObjectGrantAuditOutcome outcome = 16;
}

enum CapabilityKey {
  CAPABILITY_KEY_UNSPECIFIED = 0;
  CAPABILITY_KEY_CHANGE_DATA_FEED = 1;
  CAPABILITY_KEY_COLUMN_MAPPING = 2;
  CAPABILITY_KEY_DELETION_VECTORS = 3;
  CAPABILITY_KEY_MULTI_PARTITION_EXECUTION = 4;
  CAPABILITY_KEY_PROXY_ACCESS = 5;
  CAPABILITY_KEY_RANGE_READS = 6;
  CAPABILITY_KEY_SIGNED_URL_ACCESS = 7;
  CAPABILITY_KEY_TIME_TRAVEL = 8;
  CAPABILITY_KEY_TIMESTAMP_NTZ = 9;
  CAPABILITY_KEY_UNKNOWN_PROTOCOL_FEATURES = 10;
}

enum CapabilityState {
  CAPABILITY_STATE_UNSPECIFIED = 0;
  CAPABILITY_STATE_SUPPORTED = 1;
  CAPABILITY_STATE_NATIVE_ONLY = 2;
  CAPABILITY_STATE_UNSUPPORTED = 3;
  CAPABILITY_STATE_EXPERIMENTAL = 4;
}

enum BrowserAccessClass {
  BROWSER_ACCESS_CLASS_UNSPECIFIED = 0;
  BROWSER_ACCESS_CLASS_PUBLIC = 1;
  BROWSER_ACCESS_CLASS_LOCAL_HANDLE = 2;
  BROWSER_ACCESS_CLASS_SIGNED_URL = 3;
  BROWSER_ACCESS_CLASS_SESSION_PROXY = 4;
}

enum ReadResolutionReason {
  READ_RESOLUTION_REASON_UNSPECIFIED = 0;
  READ_RESOLUTION_REASON_POLICY_ENFORCEMENT_REQUIRED = 1;
  READ_RESOLUTION_REASON_BROWSER_UNSUPPORTED = 2;
  READ_RESOLUTION_REASON_ACCESS_DENIED = 3;
  READ_RESOLUTION_REASON_SESSION_REQUIRED = 4;
  READ_RESOLUTION_REASON_EXPIRED_CAPABILITY = 5;
  READ_RESOLUTION_REASON_UNSAFE_DESCRIPTOR = 6;
}

enum PartitionColumnType {
  PARTITION_COLUMN_TYPE_UNSPECIFIED = 0;
  PARTITION_COLUMN_TYPE_STRING = 1;
  PARTITION_COLUMN_TYPE_INT64 = 2;
  PARTITION_COLUMN_TYPE_BOOLEAN = 3;
  PARTITION_COLUMN_TYPE_UNSUPPORTED = 4;
}

enum ObjectGrantAuditAction {
  OBJECT_GRANT_AUDIT_ACTION_UNSPECIFIED = 0;
  // Legacy HTTP JSON uses "list", "head", "batch_sign", and "range";
  // protobuf JSON uses these enum symbols and must be normalized at boundaries.
  OBJECT_GRANT_AUDIT_ACTION_LIST = 1;
  OBJECT_GRANT_AUDIT_ACTION_HEAD = 2;
  OBJECT_GRANT_AUDIT_ACTION_BATCH_SIGN = 3;
  OBJECT_GRANT_AUDIT_ACTION_RANGE = 4;
}

enum ObjectGrantAuditOutcome {
  OBJECT_GRANT_AUDIT_OUTCOME_UNSPECIFIED = 0;
  // Legacy HTTP JSON uses "allowed" and "denied"; protobuf JSON uses these
  // enum symbols and must be normalized at boundaries.
  OBJECT_GRANT_AUDIT_OUTCOME_ALLOWED = 1;
  OBJECT_GRANT_AUDIT_OUTCOME_DENIED = 2;
}
