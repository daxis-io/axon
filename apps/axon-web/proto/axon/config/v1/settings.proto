syntax = "proto3";

package axon.config.v1;

import "buf/validate/validate.proto";

message Settings {
  AppearanceDefaults appearance = 1;
  EditorDefaults editor = 2;
  ExecutionDefaults execution = 3;
}

message AppearanceDefaults {
  AppearanceTheme theme = 1 [(buf.validate.field).enum.defined_only = true];
  AppearanceDensity density = 2 [(buf.validate.field).enum.defined_only = true];
  AccentColor accent_color = 3 [(buf.validate.field).enum.defined_only = true];
  bool reduce_motion = 4;
  string monospace_font = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 80
  }];
}

message EditorDefaults {
  EditorKeymap keymap = 1 [(buf.validate.field).enum.defined_only = true];
  uint32 tab_size = 2 [(buf.validate.field).uint32 = {
    gte: 2
    lte: 8
  }];
  bool word_wrap = 3;
  bool format_on_run = 4;
  string starter_sql = 5 [(buf.validate.field).string.max_len = 20000];
}

message ExecutionDefaults {
  ExecutionTarget target = 1 [(buf.validate.field).enum.defined_only = true];
  uint32 preview_row_limit = 2 [(buf.validate.field).uint32 = {
    gte: 1
    lte: 10000
  }];
  uint32 query_timeout_ms = 3 [(buf.validate.field).uint32 = {
    gte: 1000
    lte: 600000
  }];
  bool prefer_browser_runtime = 4;
}

enum AppearanceTheme {
  APPEARANCE_THEME_UNSPECIFIED = 0;
  APPEARANCE_THEME_SYSTEM = 1;
  APPEARANCE_THEME_LIGHT = 2;
  APPEARANCE_THEME_DARK = 3;
}

enum AppearanceDensity {
  APPEARANCE_DENSITY_UNSPECIFIED = 0;
  APPEARANCE_DENSITY_COMPACT = 1;
  APPEARANCE_DENSITY_COMFORTABLE = 2;
}

enum AccentColor {
  ACCENT_COLOR_UNSPECIFIED = 0;
  ACCENT_COLOR_BLUE = 1;
  ACCENT_COLOR_GREEN = 2;
  ACCENT_COLOR_AMBER = 3;
}

enum EditorKeymap {
  EDITOR_KEYMAP_UNSPECIFIED = 0;
  EDITOR_KEYMAP_DEFAULT = 1;
  EDITOR_KEYMAP_VIM = 2;
}

enum ExecutionTarget {
  EXECUTION_TARGET_UNSPECIFIED = 0;
  EXECUTION_TARGET_BROWSER = 1;
  EXECUTION_TARGET_NATIVE = 2;
  EXECUTION_TARGET_AUTO = 3;
}
