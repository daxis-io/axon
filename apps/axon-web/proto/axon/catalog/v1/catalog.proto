syntax = "proto3";

package axon.catalog.v1;

import "axon/common/v1/common.proto";

message CatalogNode {
  string connection_id = 1;
  string name = 2;
  string comment = 3;
}

message SchemaNode {
  string connection_id = 1;
  string catalog = 2;
  string name = 3;
  string comment = 4;
}

message TableNode {
  axon.common.v1.ObjectRef ref = 1;
  TableType table_type = 2;
  string comment = 3;
}

message ColumnNode {
  string name = 1;
  string type = 2;
  bool nullable = 3;
  bool partition = 4;
  string comment = 5;
}

message VolumeNode {
  axon.common.v1.ObjectRef ref = 1;
  VolumeType volume_type = 2;
  string storage_location = 3;
  string comment = 4;
}

message FunctionNode {
  axon.common.v1.ObjectRef ref = 1;
  string comment = 2;
}

message ModelNode {
  axon.common.v1.ObjectRef ref = 1;
  string comment = 2;
}

message TableMetadata {
  TableNode table = 1;
  repeated ColumnNode columns = 2;
  repeated string partition_columns = 3;
  map<string, string> properties = 4;
  optional uint64 row_count = 5;
  optional uint64 size_bytes = 6;
  optional uint64 file_count = 7;
  optional int64 latest_snapshot_version = 8;
  optional uint32 min_reader_version = 9;
  optional uint32 min_writer_version = 10;
  repeated DeltaProtocolFeature protocol_features = 11;
  string storage_location = 12;
}

message VolumeMetadata {
  VolumeNode volume = 1;
  map<string, string> properties = 2;
}

message DeltaProtocolFeature {
  string name = 1;
  bool reader = 2;
  bool writer = 3;
}

message ListCatalogsResponse {
  repeated CatalogNode catalogs = 1;
  axon.common.v1.PageInfo page = 2;
}

message ListSchemasResponse {
  repeated SchemaNode schemas = 1;
  axon.common.v1.PageInfo page = 2;
}

message ListTablesResponse {
  repeated TableNode tables = 1;
  axon.common.v1.PageInfo page = 2;
}

message ListColumnsResponse {
  repeated ColumnNode columns = 1;
  axon.common.v1.PageInfo page = 2;
}

message ListVolumesResponse {
  repeated VolumeNode volumes = 1;
  axon.common.v1.PageInfo page = 2;
}

message ListFunctionsResponse {
  repeated FunctionNode functions = 1;
  axon.common.v1.PageInfo page = 2;
}

message ListModelsResponse {
  repeated ModelNode models = 1;
  axon.common.v1.PageInfo page = 2;
}

message GetTableMetadataResponse {
  TableMetadata table = 1;
}

message GetVolumeMetadataResponse {
  VolumeMetadata volume = 1;
}

enum TableType {
  TABLE_TYPE_UNSPECIFIED = 0;
  TABLE_TYPE_TABLE = 1;
  TABLE_TYPE_VIEW = 2;
  TABLE_TYPE_MATERIALIZED_VIEW = 3;
  TABLE_TYPE_STREAMING_TABLE = 4;
}

enum VolumeType {
  VOLUME_TYPE_UNSPECIFIED = 0;
  VOLUME_TYPE_MANAGED = 1;
  VOLUME_TYPE_EXTERNAL = 2;
}
