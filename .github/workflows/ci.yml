name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      report_datafusion_wasm_size:
        description: "Run browser DataFusion engine WASM size reporting"
        required: false
        default: false
        type: boolean
      datafusion_brotli_budget_bytes:
        description: "Optional Brotli budget for the browser DataFusion engine SKU; leave empty for report-only"
        required: false
        default: ""
        type: string

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm bindgen test runner
        run: cargo install wasm-bindgen-cli --version 0.2.114 --locked

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --workspace --locked

      - name: Test shared query contract
        run: cargo test -p query-contract --locked

      - name: Test shared delta runtime support
        run: cargo test -p delta-runtime-support --locked

      - name: Test delta control plane
        run: cargo test -p delta-control-plane --locked

      - name: Test native query runtime
        run: cargo test -p native-query-runtime --locked

      - name: Test wasm query runtime and router
        run: cargo test -p wasm-query-runtime -p query-router --locked

      - name: Test DataFusion planner POC
        run: cargo test -p wasm-datafusion-planner-poc --locked --tests

      - name: Test browser DataFusion engine POC
        run: cargo test -p wasm-datafusion-poc --locked --tests

      - name: Test browser DataFusion session
        run: cargo test -p wasm-datafusion-session --locked

      - name: Test DataFusion lowering corpus
        run: cargo test -p wasm-query-runtime --locked --features datafusion-planner-poc --test datafusion_lowering_corpus

      - name: Test wasm query session
        run: cargo test -p wasm-query-session --locked

      - name: Test wasm HTTP object store
        run: cargo test -p wasm-http-object-store --locked

      - name: Test wasm Parquet engine
        run: cargo test -p wasm-parquet-engine --locked

      - name: Test wasm Delta snapshot
        run: cargo test -p wasm-delta-snapshot --locked

      - name: Test browser SDK
        run: cargo test -p browser-sdk --locked

      - name: Test browser engine worker
        run: cargo test -p browser-engine-worker --locked

      - name: Check wasm targets
        run: cargo check -p wasm-http-object-store -p wasm-parquet-engine -p wasm-delta-snapshot -p wasm-datafusion-planner-poc -p wasm-datafusion-poc -p wasm-datafusion-session -p wasm-query-runtime -p wasm-query-session -p browser-sdk -p browser-engine-worker -p browser-delta-sandbox --target wasm32-unknown-unknown --locked

      - name: Run wasm query runtime smoke
        run: cargo test -p wasm-query-runtime --target wasm32-unknown-unknown --locked --test wasm_smoke

      - name: Run DataFusion planner wasm smoke
        run: cargo test -p wasm-datafusion-planner-poc --target wasm32-unknown-unknown --locked --test wasm_smoke

      - name: Run browser DataFusion engine wasm smoke
        run: cargo test -p wasm-datafusion-poc --target wasm32-unknown-unknown --locked --test wasm_smoke

      - name: Run browser SDK wasm smoke
        run: cargo test -p browser-sdk --target wasm32-unknown-unknown --locked --test wasm_smoke

      - name: Run wasm Parquet engine smoke
        run: cargo test -p wasm-parquet-engine --target wasm32-unknown-unknown --locked --test wasm_smoke

      - name: Run wasm Delta snapshot smoke
        run: cargo test -p wasm-delta-snapshot --target wasm32-unknown-unknown --locked --test wasm_smoke

      - name: Run browser engine worker wasm smoke
        run: cargo test -p browser-engine-worker --target wasm32-unknown-unknown --locked --test wasm_smoke -- --nocapture

      - name: Validate repo-grounded browser V1 docs
        run: |
          for file in README.md docs/program/browser-lakehouse-release-handoff.md docs/program/browser-release-integration-runbook.md docs/release-gates/browser-wasm-delta-gcs-launch-checklist.md tests/perf/README.md tests/security/README.md; do
            rg -q "narrow runtime \+ streaming scan \+ in-memory session shell" "$file"
          done
          for file in README.md docs/program/browser-lakehouse-engine-strategy.md docs/program/browser-lakehouse-release-handoff.md docs/program/browser-release-integration-runbook.md docs/release-gates/browser-wasm-delta-gcs-external-blockers.md tests/perf/README.md tests/security/README.md; do
            rg -q "Delta snapshot reconstruction is already repo-owned" "$file"
          done
          for file in README.md docs/program/browser-lakehouse-release-handoff.md docs/program/browser-release-integration-runbook.md docs/release-gates/browser-wasm-delta-gcs-launch-checklist.md tests/perf/README.md tests/security/README.md; do
            rg -q "in-memory only" "$file"
          done
          for file in README.md docs/program/browser-lakehouse-engine-strategy.md docs/program/browser-lakehouse-release-handoff.md docs/release-gates/browser-wasm-delta-gcs-launch-checklist.md tests/perf/README.md tests/security/README.md; do
            rg -q "OPFS / IndexedDB" "$file"
          done
          for file in README.md docs/program/browser-lakehouse-engine-strategy.md docs/release-gates/browser-wasm-delta-gcs-external-blockers.md tests/perf/README.md tests/security/README.md; do
            rg -q "browser DataFusion remains deferred|browser DataFusion as the default execution SKU|broad browser DataFusion" "$file"
          done
          for file in README.md docs/program/browser-lakehouse-release-handoff.md docs/program/browser-release-integration-runbook.md docs/release-gates/browser-wasm-delta-gcs-external-blockers.md; do
            rg -q "signed URL issuance" "$file"
            rg -q "proxy-mode request issuance|Proxy-mode request issuance" "$file"
          done
          for file in README.md docs/program/browser-lakehouse-release-handoff.md docs/program/browser-release-integration-runbook.md docs/release-gates/browser-wasm-delta-gcs-external-blockers.md tests/security/README.md; do
            rg -q "audit logging" "$file"
          done
          for file in README.md docs/program/browser-lakehouse-release-handoff.md docs/program/browser-release-integration-runbook.md docs/release-gates/browser-wasm-delta-gcs-external-blockers.md docs/release-gates/browser-wasm-delta-gcs-launch-checklist.md tests/security/README.md; do
            rg -q "CORS/origin validation|CORS is validated" "$file"
          done
          for file in docs/program/browser-lakehouse-release-handoff.md docs/release-gates/browser-wasm-delta-gcs-launch-checklist.md docs/release-gates/browser-wasm-delta-gcs-external-blockers.md tests/security/README.md; do
            rg -q "outside repo-owned success claims|remain external blockers|External blocker" "$file"
          done

      - name: Report host-proxy browser worker startup and footprint baselines
        run: cargo test -p browser-engine-worker --locked report_worker_artifact_baseline -- --exact --nocapture

      - name: Enforce browser worker artifact size budget
        run: bash tests/perf/report_browser_worker_artifact.sh

      - name: Verify browser worker dependency boundary
        run: bash tests/conformance/verify_browser_worker_dependency_boundary.sh

      - name: Verify browser delta sandbox DataFusion runtime
        run: bash tests/conformance/verify_browser_delta_sandbox_datafusion_runtime.sh

      - name: Run browser dependency guardrail regression
        run: bash tests/security/verify_browser_dependency_guardrails_test.sh

      - name: Verify browser dependency and bundle guardrails
        run: bash tests/security/verify_browser_dependency_guardrails.sh

      - name: Run patch inventory guard regression
        run: bash tests/conformance/verify_patch_inventory_state_test.sh

      - name: Verify patch inventory state
        run: bash tests/conformance/verify_patch_inventory_state.sh

      - name: Verify workspace layout
        run: bash tests/conformance/verify_workspace_layout.sh

      - name: Validate env-gated native GCS fixture configuration
        env:
          AXON_GCS_TEST_PARTITIONED_TABLE_URI: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_URI }}
          AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION }}
          AXON_GCS_TEST_STALE_HISTORY_TABLE_URI: ${{ vars.AXON_GCS_TEST_STALE_HISTORY_TABLE_URI }}
          AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION: ${{ vars.AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION }}
        run: |
          if { [ -n "$AXON_GCS_TEST_STALE_HISTORY_TABLE_URI" ] && [ -z "$AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION" ]; } || \
             { [ -z "$AXON_GCS_TEST_STALE_HISTORY_TABLE_URI" ] && [ -n "$AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION" ]; }; then
            echo "AXON_GCS_TEST_STALE_HISTORY_TABLE_URI and AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION must be configured together" >&2
            exit 1
          fi
          if [ -n "$AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION" ] && [ -z "$AXON_GCS_TEST_PARTITIONED_TABLE_URI" ]; then
            echo "AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION requires AXON_GCS_TEST_PARTITIONED_TABLE_URI" >&2
            exit 1
          fi

      - name: Authenticate for env-gated native GCS smoke
        if: ${{ (vars.AXON_GCS_TEST_TABLE_URI != '' || vars.AXON_GCS_TEST_PARTITIONED_TABLE_URI != '' || vars.AXON_GCS_TEST_FORBIDDEN_TABLE_URI != '' || vars.AXON_GCS_TEST_NOT_FOUND_TABLE_URI != '' || vars.AXON_GCS_TEST_STALE_HISTORY_TABLE_URI != '' || vars.AXON_GCS_TEST_MISSING_OBJECT_TABLE_URI != '') && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.AXON_GCP_CREDENTIALS_JSON }}

      - name: Run env-gated native GCS smoke
        if: ${{ vars.AXON_GCS_TEST_TABLE_URI != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_TABLE_URI: ${{ vars.AXON_GCS_TEST_TABLE_URI }}
        run: cargo test -p native-query-runtime --locked bootstrap_table_supports_env_gated_gcs_smoke -- --exact --nocapture

      - name: Run env-gated native GCS query smoke
        if: ${{ vars.AXON_GCS_TEST_TABLE_URI != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_TABLE_URI: ${{ vars.AXON_GCS_TEST_TABLE_URI }}
        run: cargo test -p native-query-runtime --locked execute_query_supports_env_gated_gcs_smoke -- --exact --nocapture

      - name: Run env-gated forbidden native GCS smoke
        if: ${{ vars.AXON_GCS_TEST_FORBIDDEN_TABLE_URI != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_FORBIDDEN_TABLE_URI: ${{ vars.AXON_GCS_TEST_FORBIDDEN_TABLE_URI }}
        run: cargo test -p native-query-runtime --locked bootstrap_table_rejects_env_gated_forbidden_gcs_smoke -- --exact --nocapture

      - name: Run env-gated not-found native GCS smoke
        if: ${{ vars.AXON_GCS_TEST_NOT_FOUND_TABLE_URI != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_NOT_FOUND_TABLE_URI: ${{ vars.AXON_GCS_TEST_NOT_FOUND_TABLE_URI }}
        run: cargo test -p native-query-runtime --locked bootstrap_table_rejects_env_gated_not_found_gcs_smoke -- --exact --nocapture

      - name: Run env-gated stale-history native GCS smoke
        if: ${{ vars.AXON_GCS_TEST_STALE_HISTORY_TABLE_URI != '' && vars.AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_STALE_HISTORY_TABLE_URI: ${{ vars.AXON_GCS_TEST_STALE_HISTORY_TABLE_URI }}
          AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION: ${{ vars.AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION }}
        run: cargo test -p native-query-runtime --locked execute_query_rejects_env_gated_stale_history_gcs_smoke -- --exact --nocapture

      - name: Run env-gated missing-object native GCS smoke
        if: ${{ vars.AXON_GCS_TEST_MISSING_OBJECT_TABLE_URI != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_MISSING_OBJECT_TABLE_URI: ${{ vars.AXON_GCS_TEST_MISSING_OBJECT_TABLE_URI }}
        run: cargo test -p native-query-runtime --locked execute_query_rejects_env_gated_missing_object_gcs_smoke -- --exact --nocapture

      - name: Run env-gated partitioned native GCS pruning smoke
        if: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_URI != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_PARTITIONED_TABLE_URI: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_URI }}
        run: cargo test -p native-query-runtime --locked execute_query_supports_env_gated_partitioned_gcs_pruning_smoke -- --exact --nocapture

      - name: Run env-gated partitioned native GCS snapshot-version smoke
        if: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_URI != '' && vars.AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_PARTITIONED_TABLE_URI: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_URI }}
          AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION }}
        run: cargo test -p native-query-runtime --locked execute_query_supports_env_gated_partitioned_gcs_snapshot_version_smoke -- --exact --nocapture

  browser-datafusion-wasm-size:
    name: Experimental browser DataFusion WASM size report
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.report_datafusion_wasm_size }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install WASM size tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen brotli gzip

      - name: Install Rust WASM reporting tools
        run: |
          cargo install wasm-bindgen-cli --version 0.2.114 --locked
          cargo install twiggy --locked

      - name: Run browser DataFusion engine size report
        env:
          AXON_DF_BROTLI_BUDGET_BYTES: ${{ inputs.datafusion_brotli_budget_bytes }}
        run: bash tests/perf/report_datafusion_wasm_size.sh

      - name: Run browser DataFusion engine smoke report
        run: bash tests/perf/browser_datafusion_engine_smoke.sh

      - name: Upload browser DataFusion engine size artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-datafusion-engine-size-report
          path: target/df-size
          if-no-files-found: warn
