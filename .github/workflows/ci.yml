name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm bindgen test runner
        run: cargo install wasm-bindgen-cli --version 0.2.114 --locked

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --workspace --locked

      - name: Test shared query contract
        run: cargo test -p query-contract --locked

      - name: Test shared delta runtime support
        run: cargo test -p delta-runtime-support --locked

      - name: Test delta control plane
        run: cargo test -p delta-control-plane --locked

      - name: Test native query runtime
        run: cargo test -p native-query-runtime --locked

      - name: Test wasm query runtime
        run: cargo test -p wasm-query-runtime --locked

      - name: Test wasm HTTP object store
        run: cargo test -p wasm-http-object-store --locked

      - name: Test wasm Parquet engine
        run: cargo test -p wasm-parquet-engine --locked

      - name: Test wasm Delta snapshot
        run: cargo test -p wasm-delta-snapshot --locked

      - name: Test browser SDK
        run: cargo test -p browser-sdk --locked

      - name: Check wasm targets
        run: cargo check -p wasm-http-object-store -p wasm-parquet-engine -p wasm-delta-snapshot -p wasm-query-runtime -p browser-sdk --target wasm32-unknown-unknown --locked

      - name: Run wasm query runtime smoke
        run: cargo test -p wasm-query-runtime --target wasm32-unknown-unknown --locked --test wasm_smoke

      - name: Run browser SDK wasm smoke
        run: cargo test -p browser-sdk --target wasm32-unknown-unknown --locked --test wasm_smoke

      - name: Run wasm Parquet engine smoke
        run: cargo test -p wasm-parquet-engine --target wasm32-unknown-unknown --locked --test wasm_smoke

      - name: Run wasm Delta snapshot smoke
        run: cargo test -p wasm-delta-snapshot --target wasm32-unknown-unknown --locked --test wasm_smoke

      - name: Report browser wasm size proxy
        run: |
          rm -f target/wasm32-unknown-unknown/release/deps/libwasm_http_object_store-*.rlib \
                target/wasm32-unknown-unknown/release/deps/libwasm_parquet_engine-*.rlib \
                target/wasm32-unknown-unknown/release/deps/libwasm_delta_snapshot-*.rlib \
                target/wasm32-unknown-unknown/release/deps/libwasm_query_runtime-*.rlib \
                target/wasm32-unknown-unknown/release/deps/libbrowser_sdk-*.rlib

          cargo build -p wasm-http-object-store -p wasm-parquet-engine -p wasm-delta-snapshot -p wasm-query-runtime -p browser-sdk --target wasm32-unknown-unknown --release --locked

          report_size() {
            local crate="$1"
            local budget="$2"
            local pattern="target/wasm32-unknown-unknown/release/deps/lib${crate//-/_}-*.rlib"
            local max_size=0
            local file

            for file in $pattern; do
              [ -e "$file" ] || continue
              local size
              size=$(stat -c%s "$file")
              if [ "$size" -gt "$max_size" ]; then
                max_size="$size"
              fi
            done

            if [ "$max_size" -eq 0 ]; then
              echo "missing release artifact for ${crate}" >&2
              exit 1
            fi

            echo "${crate}: ${max_size} bytes (budget ${budget} bytes)"

            if [ "$max_size" -gt "$budget" ]; then
              echo "${crate} exceeded the browser wasm size proxy budget" >&2
              exit 1
            fi
          }

          report_size wasm-http-object-store 320000
          report_size wasm-parquet-engine 640000
          report_size wasm-delta-snapshot 860000
          report_size wasm-query-runtime 2300000
          report_size browser-sdk 260000

      - name: Verify workspace layout
        run: bash tests/conformance/verify_workspace_layout.sh

      - name: Validate env-gated native GCS fixture configuration
        env:
          AXON_GCS_TEST_PARTITIONED_TABLE_URI: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_URI }}
          AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION }}
          AXON_GCS_TEST_STALE_HISTORY_TABLE_URI: ${{ vars.AXON_GCS_TEST_STALE_HISTORY_TABLE_URI }}
          AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION: ${{ vars.AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION }}
        run: |
          if { [ -n "$AXON_GCS_TEST_STALE_HISTORY_TABLE_URI" ] && [ -z "$AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION" ]; } || \
             { [ -z "$AXON_GCS_TEST_STALE_HISTORY_TABLE_URI" ] && [ -n "$AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION" ]; }; then
            echo "AXON_GCS_TEST_STALE_HISTORY_TABLE_URI and AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION must be configured together" >&2
            exit 1
          fi
          if [ -n "$AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION" ] && [ -z "$AXON_GCS_TEST_PARTITIONED_TABLE_URI" ]; then
            echo "AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION requires AXON_GCS_TEST_PARTITIONED_TABLE_URI" >&2
            exit 1
          fi

      - name: Authenticate for env-gated native GCS smoke
        if: ${{ (vars.AXON_GCS_TEST_TABLE_URI != '' || vars.AXON_GCS_TEST_PARTITIONED_TABLE_URI != '' || vars.AXON_GCS_TEST_FORBIDDEN_TABLE_URI != '' || vars.AXON_GCS_TEST_NOT_FOUND_TABLE_URI != '' || vars.AXON_GCS_TEST_STALE_HISTORY_TABLE_URI != '' || vars.AXON_GCS_TEST_MISSING_OBJECT_TABLE_URI != '') && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.AXON_GCP_CREDENTIALS_JSON }}

      - name: Run env-gated native GCS smoke
        if: ${{ vars.AXON_GCS_TEST_TABLE_URI != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_TABLE_URI: ${{ vars.AXON_GCS_TEST_TABLE_URI }}
        run: cargo test -p native-query-runtime --locked bootstrap_table_supports_env_gated_gcs_smoke -- --exact --nocapture

      - name: Run env-gated native GCS query smoke
        if: ${{ vars.AXON_GCS_TEST_TABLE_URI != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_TABLE_URI: ${{ vars.AXON_GCS_TEST_TABLE_URI }}
        run: cargo test -p native-query-runtime --locked execute_query_supports_env_gated_gcs_smoke -- --exact --nocapture

      - name: Run env-gated forbidden native GCS smoke
        if: ${{ vars.AXON_GCS_TEST_FORBIDDEN_TABLE_URI != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_FORBIDDEN_TABLE_URI: ${{ vars.AXON_GCS_TEST_FORBIDDEN_TABLE_URI }}
        run: cargo test -p native-query-runtime --locked bootstrap_table_rejects_env_gated_forbidden_gcs_smoke -- --exact --nocapture

      - name: Run env-gated not-found native GCS smoke
        if: ${{ vars.AXON_GCS_TEST_NOT_FOUND_TABLE_URI != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_NOT_FOUND_TABLE_URI: ${{ vars.AXON_GCS_TEST_NOT_FOUND_TABLE_URI }}
        run: cargo test -p native-query-runtime --locked bootstrap_table_rejects_env_gated_not_found_gcs_smoke -- --exact --nocapture

      - name: Run env-gated stale-history native GCS smoke
        if: ${{ vars.AXON_GCS_TEST_STALE_HISTORY_TABLE_URI != '' && vars.AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_STALE_HISTORY_TABLE_URI: ${{ vars.AXON_GCS_TEST_STALE_HISTORY_TABLE_URI }}
          AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION: ${{ vars.AXON_GCS_TEST_STALE_HISTORY_SNAPSHOT_VERSION }}
        run: cargo test -p native-query-runtime --locked execute_query_rejects_env_gated_stale_history_gcs_smoke -- --exact --nocapture

      - name: Run env-gated missing-object native GCS smoke
        if: ${{ vars.AXON_GCS_TEST_MISSING_OBJECT_TABLE_URI != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_MISSING_OBJECT_TABLE_URI: ${{ vars.AXON_GCS_TEST_MISSING_OBJECT_TABLE_URI }}
        run: cargo test -p native-query-runtime --locked execute_query_rejects_env_gated_missing_object_gcs_smoke -- --exact --nocapture

      - name: Run env-gated partitioned native GCS pruning smoke
        if: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_URI != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_PARTITIONED_TABLE_URI: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_URI }}
        run: cargo test -p native-query-runtime --locked execute_query_supports_env_gated_partitioned_gcs_pruning_smoke -- --exact --nocapture

      - name: Run env-gated partitioned native GCS snapshot-version smoke
        if: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_URI != '' && vars.AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION != '' && secrets.AXON_GCP_CREDENTIALS_JSON != '' }}
        env:
          AXON_GCS_TEST_PARTITIONED_TABLE_URI: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_URI }}
          AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION: ${{ vars.AXON_GCS_TEST_PARTITIONED_TABLE_SNAPSHOT_VERSION }}
        run: cargo test -p native-query-runtime --locked execute_query_supports_env_gated_partitioned_gcs_snapshot_version_smoke -- --exact --nocapture
